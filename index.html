<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BovGest — Acesso</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="login-page">

  <!-- Coluna esquerda: visual -->
  <div class="login-cover">
    <div class="login-cover__logo">Bov<span>Gest</span></div>
    <p class="login-cover__tagline">Gestão inteligente de gado.<br>Do pasto à venda.</p>
    <div class="login-cover__art">🐄</div>
  </div>

  <!-- Coluna direita: formulário -->
  <div class="login-panel">
    <h1 class="login-panel__title">Bem-vindo de volta</h1>
    <p class="login-panel__sub">Acesse sua conta para continuar</p>

    <form class="login-form" id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="seu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button
        class="btn btn-primary"
        type="submit"
        id="login-btn"
        style="width:100%;justify-content:center;margin-top:8px;"
      >
        Entrar
      </button>

      <div
        id="login-error"
        style="
          display:none;
          margin-top:14px;
          padding:10px 14px;
          background:#fee2e2;
          color:#dc2626;
          border-radius:var(--radius);
          font-size:.85rem;
          border:1px solid #fca5a5;
        "
      ></div>
    </form>

    <p class="login-footer">
      BovGest v1.0 &mdash; Gestão de Gado
    </p>
  </div>
</div>

<script src="api/supabase.js"></script>
<script src="api/helpers.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Redireciona para o dashboard se já estiver autenticado
    if (SupabaseAPI.isAuthenticated()) {
      window.location.href = 'dashboard.html';
      return;
    }

    const form   = document.getElementById('login-form');
    const btn    = document.getElementById('login-btn');
    const errEl  = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errEl.style.display = 'none';
      Helpers.setLoading(btn, true);

      try {
        await SupabaseAPI.signIn(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent   = err.message || 'Falha ao entrar. Verifique suas credenciais.';
        errEl.style.display = 'block';
      } finally {
        Helpers.setLoading(btn, false, 'Entrar');
      }
    });
  });
</script>
</body>
</html>
