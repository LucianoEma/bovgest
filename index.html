<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BovGest — Acesso</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="login-page">

  <!-- Coluna esquerda: visual -->
  <div class="login-cover">
    <div class="login-cover__logo">Bov<span>Gest</span></div>
    <p class="login-cover__tagline">Gestão inteligente de gado.<br>Do pasto à venda.</p>
    <div class="login-cover__art">🐄</div>
  </div>

  <!-- Coluna direita: formulário -->
  <div class="login-panel">
    <h1 class="login-panel__title">Bem-vindo de volta</h1>
    <p class="login-panel__sub">Acesse sua conta para continuar</p>

    <form class="login-form" id="login-form" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="seu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button
        class="btn btn-primary"
        type="button"
        id="login-btn"
        onclick="handleLogin()"
        style="width:100%;justify-content:center;margin-top:8px;"
      >
        Entrar
      </button>

      <!-- Enter no campo de senha também dispara o login -->
      <script>
        document.getElementById('password').addEventListener('keydown', function(e) {
          if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('email').addEventListener('keydown', function(e) {
          if (e.key === 'Enter') handleLogin();
        });
      </script>

      <div
        id="login-error"
        style="
          display:none;
          margin-top:14px;
          padding:10px 14px;
          background:#fee2e2;
          color:#dc2626;
          border-radius:var(--radius, 8px);
          font-size:.85rem;
          border:1px solid #fca5a5;
        "
      ></div>
    </form>

    <p class="login-footer">
      BovGest v1.0 &mdash; Gestão de Gado
    </p>
  </div>
</div>

<script src="api/supabase.js"></script>
<script>
  // Redireciona se já estiver logado
  if (typeof SupabaseAPI !== 'undefined' && SupabaseAPI.isAuthenticated()) {
    window.location.href = 'dashboard.html';
  }

  async function handleLogin() {
    const btn   = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      errEl.textContent   = 'Preencha e-mail e senha.';
      errEl.style.display = 'block';
      return;
    }

    // Desabilita botão
    btn.disabled    = true;
    btn.textContent = 'Entrando...';
    errEl.style.display = 'none';

    const SUPABASE_URL      = 'https://qqxxzrymmscqamqljmae.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxeHh6cnltbXNjcWFtcWxqbWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5ODM5MDksImV4cCI6MjA5MjU1OTkwOX0.kIwLs2Bmb9k9ZCC6vBxpoiW2SEZIeeOM0JUHIegA_ZU';

    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: {
          'apikey':       SUPABASE_ANON_KEY,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error_description || data.msg || 'Credenciais inválidas.');
      }

      // Salva sessão e redireciona
      localStorage.setItem('bovgest_session', JSON.stringify(data));
      window.location.href = 'dashboard.html';

    } catch (err) {
      errEl.textContent   = err.message || 'Falha ao entrar. Verifique suas credenciais.';
      errEl.style.display = 'block';
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Entrar';
    }
  }
</script>
</body>
</html>
