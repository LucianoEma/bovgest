<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BovGest — Acesso</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="login-page">

  <!-- Coluna esquerda: visual -->
  <div class="login-cover">
    <div class="login-cover__logo">Bov<span>Gest</span></div>
    <p class="login-cover__tagline">Gestão inteligente de gado.<br>Do pasto à venda.</p>
    <div class="login-cover__art">
      <svg width="180" height="180" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="40" rx="18" ry="12" fill="#c8a86b"/>
        <ellipse cx="32" cy="24" rx="11" ry="10" fill="#c8a86b"/>
        <ellipse cx="32" cy="31" rx="7" ry="4.5" fill="#a07848"/>
        <circle cx="29.5" cy="31.5" r="1.5" fill="#7a5030"/>
        <circle cx="34.5" cy="31.5" r="1.5" fill="#7a5030"/>
        <circle cx="27" cy="21" r="2.2" fill="#1a0e00"/>
        <circle cx="37" cy="21" r="2.2" fill="#1a0e00"/>
        <circle cx="27.7" cy="20.4" r="0.7" fill="#fff"/>
        <circle cx="37.7" cy="20.4" r="0.7" fill="#fff"/>
        <ellipse cx="20" cy="20" rx="4" ry="2.5" fill="#c8a86b" transform="rotate(-30 20 20)"/>
        <ellipse cx="44" cy="20" rx="4" ry="2.5" fill="#c8a86b" transform="rotate(30 44 20)"/>
        <ellipse cx="20" cy="20" rx="2.2" ry="1.3" fill="#e8b4a0" transform="rotate(-30 20 20)"/>
        <ellipse cx="44" cy="20" rx="2.2" ry="1.3" fill="#e8b4a0" transform="rotate(30 44 20)"/>
        <path d="M22 16 Q16 8 13 10" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M42 16 Q48 8 51 10" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <rect x="18" y="50" width="5" height="8" rx="2" fill="#a07848"/>
        <rect x="26" y="51" width="5" height="7" rx="2" fill="#a07848"/>
        <rect x="33" y="51" width="5" height="7" rx="2" fill="#a07848"/>
        <rect x="41" y="50" width="5" height="8" rx="2" fill="#a07848"/>
        <path d="M50 38 Q58 34 56 42 Q54 46 57 50" stroke="#c8a86b" stroke-width="2" stroke-linecap="round" fill="none"/>
        <ellipse cx="36" cy="37" rx="7" ry="5" fill="#8B5E3C" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Coluna direita: formulário -->
  <div class="login-panel">
    <h1 class="login-panel__title">Bem-vindo de volta</h1>
    <p class="login-panel__sub">Acesse sua conta para continuar</p>

    <div class="login-form" id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="seu@email.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button
        class="btn btn-primary"
        type="button"
        id="login-btn"
        onclick="handleLogin()"
        style="width:100%;justify-content:center;margin-top:8px;"
      >
        Entrar
      </button>

      <div
        id="login-error"
        style="
          display:none;
          margin-top:14px;
          padding:10px 14px;
          background:#fee2e2;
          color:#dc2626;
          border-radius:var(--radius, 8px);
          font-size:.85rem;
          border:1px solid #fca5a5;
        "
      ></div>


    </div>

    <p class="login-footer">
      BovGest v1.0 &mdash; Gestão de Gado
    </p>
  </div>
</div>

<script src="lib/supabase.js"></script>
<script>
  // Redireciona se já estiver logado
  if (typeof SupabaseAPI !== 'undefined' && SupabaseAPI.isAuthenticated()) {
    window.location.href = 'dashboard.html';
  }

  // Enter dispara login
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });

  async function handleLogin() {
    const btn      = document.getElementById('login-btn');
    const errEl    = document.getElementById('login-error');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      errEl.textContent   = 'Preencha e-mail e senha.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Entrando...';
    errEl.style.display = 'none';

    try {
      await SupabaseAPI.signIn(email, password);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errEl.textContent   = err.message || 'Falha ao entrar. Verifique suas credenciais.';
      errEl.style.display = 'block';
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Entrar';
    }
  }
</script>
</body>
</html>
